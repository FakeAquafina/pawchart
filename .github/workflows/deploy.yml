name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Test ────────────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package.json
            client/package.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint --if-present

      - name: Lint client
        working-directory: client
        run: npm run lint --if-present

      - name: Build client (smoke test)
        working-directory: client
        run: npm run build

      - name: Check for secrets accidentally committed
        run: |
          if grep -r "sk-ant-" . --include="*.js" --include="*.jsx" --include="*.ts" --include="*.env" 2>/dev/null | grep -v ".gitignore"; then
            echo "❌ Possible API key found in source!"
            exit 1
          fi
          if grep -r "ANTHROPIC_API_KEY=sk-" . --include="*.env" 2>/dev/null; then
            echo "❌ .env file with real key was committed!"
            exit 1
          fi
          echo "✅ No secrets found"

  # ── Job 2: Deploy (only on push to main, after CI passes) ─────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci                        # only runs if CI job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/pawchart/deploy.sh

      - name: Notify success
        if: success()
        run: echo "✅ Deployed successfully to ${{ secrets.DEPLOY_HOST }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check the logs above"
